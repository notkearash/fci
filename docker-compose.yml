services:
  mongodb:
    image: mongo:7
    container_name: vision1m-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vision1m-fastapi
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: vision_1m
    volumes:
      - .:/app
    depends_on:
      - mongodb

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vision1m-streamlit
    command: streamlit run streamlit_app.py --server.address=0.0.0.0 --server.port=8501 --server.fileWatcherType=poll
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: vision_1m
    volumes:
      - .:/app
    depends_on:
      - mongodb

volumes:
  mongodb_data:
